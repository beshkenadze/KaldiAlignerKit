name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENFST_VERSION: "1.8.4"

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --strict --quiet

  format:
    name: SwiftFormat
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Check formatting
        run: swiftformat . --lint

  build-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Kaldi
        id: cache-kaldi
        uses: actions/cache@v4
        with:
          path: /tmp/kaldi
          key: kaldi-${{ runner.os }}-${{ runner.arch }}-v2

      - name: Install build dependencies
        if: steps.cache-kaldi.outputs.cache-hit != 'true'
        run: brew install automake autoconf libtool

      - name: Build OpenFST
        if: steps.cache-kaldi.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/kaldi-asr/kaldi.git /tmp/kaldi
          cd /tmp/kaldi/tools

          # Download OpenFST (try multiple mirrors)
          curl -fSL -A "Mozilla/5.0" \
            "https://www.openfst.org/twiki/pub/FST/FstDownload/openfst-${OPENFST_VERSION}.tar.gz" \
            -o openfst-${OPENFST_VERSION}.tar.gz \
          || curl -fSL \
            "https://www.openslr.org/resources/2/openfst-${OPENFST_VERSION}.tar.gz" \
            -o openfst-${OPENFST_VERSION}.tar.gz

          # Build OpenFST directly (bypass check_dependencies.sh)
          tar xf openfst-${OPENFST_VERSION}.tar.gz
          cd openfst-${OPENFST_VERSION}
          autoreconf -fi 2>/dev/null || true
          CXXFLAGS="-O3 -fPIC" ./configure \
            --enable-static --disable-shared \
            --enable-far --enable-ngram-fsts \
            --enable-lookahead-fsts --with-pic \
            --prefix="$(cd .. && pwd)/openfst"
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Build Kaldi
        if: steps.cache-kaldi.outputs.cache-hit != 'true'
        run: |
          cd /tmp/kaldi/src
          ./configure --static --static-fst --fst-root="$(cd ../tools/openfst && pwd)"
          CXXFLAGS="-O3 -fPIC" make -j$(sysctl -n hw.ncpu) \
            base matrix util feat tree gmm hmm transform fstext decoder lat lm

      - name: Symlink Kaldi to expected path
        run: |
          sudo mkdir -p /Volumes/DATA
          sudo ln -s /tmp/kaldi /Volumes/DATA/kaldi

      - name: Build
        run: swift build --target KaldiAlignerKit

      - name: Test
        run: swift test
